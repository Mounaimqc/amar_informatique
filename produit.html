  <style>
    :root {
      --primary-color: #6366f1; --secondary-color: #f59e0b;
      --bg-main: #0f0f1a; --bg-card: #1a1a2e; --bg-hover: #252542;
      --text-main: #ffffff; --text-muted: #a0a0b0; --border: #333355;
      --success: #22c55e; --danger: #ef4444; --shadow: 0 10px 40px rgba(0,0,0,0.3);
      --radius: 20px; --transition: all 0.3s ease;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-main: #f8fafc; --bg-card: #ffffff; --bg-hover: #f1f5f9;
        --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        --shadow: 0 10px 40px rgba(0,0,0,0.1);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, sans-serif; background: var(--bg-main);
      color: var(--text-main); line-height: 1.6; min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    img { max-width: 100%; height: auto; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; transition: var(--transition); }

    /* Header */
    header {
      background: var(--bg-card); padding: 15px 0;
      box-shadow: var(--shadow); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-content {
      display: flex; justify-content: space-between; align-items: center; gap: 15px;
    }
    .logo-link {
      display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem;
    }
    .logo-link img { height: 40px; border-radius: 8px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--primary-color); font-weight: 500; padding: 8px 16px;
      border-radius: 50px; background: var(--bg-hover);
      transition: var(--transition);
    }
    .back-btn:hover { transform: translateX(-3px); background: var(--primary-color); color: #fff; }

    /* ========== Product Detail Layout - الصورة في المنتصف ========== */
    .product-detail-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      padding: 30px 20px;
      align-items: start;
    }
    
    @media (max-width: 900px) {
      .product-detail-page {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    /* ✅ حاوية الصورة - متمركزة تماماً */
    .detail-image-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 100px;
      
      /* ✅ تمركز الصورة في المنتصف */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      text-align: center;
    }

    /* ✅ الصورة نفسها - متمركزة */
    .detail-image {
      max-width: 100%;
      max-height: 450px;
      width: auto;
      height: auto;
      object-fit: contain;
      margin: 0 auto;
      border-radius: 15px;
      transition: var(--transition);
      display: block;
    }

    .detail-image:hover {
      transform: scale(1.05);
    }

    /* عمود المعلومات */
    .detail-info {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
    }
    .detail-info h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .product-category {
      color: var(--primary-color);
      font-weight: 600;
      margin-bottom: 15px;
      text-transform: capitalize;
      font-size: 1rem;
    }
    .product-description {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 25px;
      font-size: 1.05rem;
    }
    .detail-price {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--secondary-color);
      margin-bottom: 25px;
    }
    .detail-price old {
      font-size: 1.2rem;
      color: var(--text-muted);
      text-decoration: line-through;
      font-weight: 400;
      margin-right: 12px;
    }

    .btn-add-cart, .btn-buy-now {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      margin-bottom: 12px;
    }
    .btn-add-cart {
      background: var(--primary-color);
      color: #fff;
    }
    .btn-add-cart:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
      filter: brightness(0.95);
    }
    .btn-buy-now {
      background: var(--success);
      color: #fff;
    }
    .btn-buy-now:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(34,197,94,0.4);
      filter: brightness(0.95);
    }

    /* Order Form */
    .order-form {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid var(--border);
    }
    .order-form h3 {
      margin-bottom: 20px;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .shipping-price {
      background: var(--bg-hover);
      padding: 12px 15px;
      border-radius: 10px;
      margin: 15px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }
    .shipping-price i { color: var(--primary-color); }
    .shipping-price strong {
      margin-left: auto;
      color: var(--secondary-color);
      font-weight: 700;
    }

    .btn-submit-order {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: var(--success);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      margin-top: 10px;
    }
    .btn-submit-order:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(34,197,94,0.4);
    }
    .btn-submit-order:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
    }

    /* Loading & Error States */
    .loading, .error {
      text-align: center;
      padding: 60px 20px;
    }
    .loading i, .error i {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .error { color: var(--danger); }
    .error a { color: var(--primary-color); font-weight: 600; }
    .error button {
      margin-top: 15px;
      padding: 10px 20px;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Share Button */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 50px;
      background: var(--bg-hover);
      color: var(--text-main);
      font-size: 0.9rem;
      margin-bottom: 15px;
      transition: var(--transition);
    }
    .share-btn:hover {
      background: var(--primary-color);
      color: #fff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

    /* ========== تحسينات الموبايل - الصورة دائماً في المنتصف ========== */
    @media (max-width: 768px) {
      .detail-image-container {
        position: relative;
        top: 0;
        padding: 20px;
        min-height: 300px;
      }
      .detail-image {
        max-height: 350px;
      }
      .detail-info {
        padding: 20px;
      }
      .detail-info h1 {
        font-size: 1.5rem;
      }
      .detail-price {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 480px) {
      .product-detail-page {
        padding: 20px 15px;
        gap: 20px;
      }
      .detail-image-container {
        padding: 15px;
        min-height: 250px;
      }
      .detail-image {
        max-height: 280px;
      }
    }
  </style>
</head>

    // ========== Load Product ==========
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof window.db === 'undefined') {
        showError('Firebase non initialisé. Veuillez actualiser la page.');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      
      if (!productId) {
        showError('Produit non spécifié dans l\'URL');
        return;
      }

      try {
        const doc = await db.collection('produits').doc(productId).get();
        
        if (!doc.exists) {
          showError('Produit introuvable dans la base de données');
          return;
        }
        
        const product = { id: doc.id, ...doc.data() };
        renderProductPage(product);
        
        if (typeof fbq !== 'undefined') {
          fbq('track', 'ViewContent', { 
            content_name: product.name, 
            value: product.price, 
            currency: 'DZD' 
          });
        }
      } catch (error) {
        console.error('❌ Erreur chargement produit:', error.code, error.message);
        
        if (error.code === 'permission-denied') {
          showError(`
            🔐 Accès refusé à la base de données<br>
            <small>Vérifiez les Rules Firebase Console</small><br>
            Collection: <strong>produits</strong> doit avoir:<br>
            <code>allow read: if true;</code>
          `);
        } else if (error.code === 'not-found') {
          showError('Produit introuvable. Il a peut-être été supprimé.');
        } else {
          showError(`Erreur: ${error.message}<br><button onclick="location.reload()">Réessayer</button>`);
        }
      }
    });

    // ========== Render Product Page ==========
    function renderProductPage(product) {
      const container = document.getElementById('productContainer');
      const price = parseFloat(product.price) || 0;
      const oldPrice = product.oldPrice ? parseFloat(product.oldPrice) : null;
      
      const priceDisplay = oldPrice 
        ? `<old>${oldPrice.toLocaleString('fr-FR')}</old> ${price.toLocaleString('fr-FR')} DA`
        : `${price.toLocaleString('fr-FR')} DA`;

      // ✅ تخزين بيانات المنتج بشكل آمن للزر
      const productDataSafe = JSON.stringify({
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image
      }).replace(/'/g, "\\'");

      container.innerHTML = `
        <div class="product-detail-page">
          <!-- Image Column - الصورة في المنتصف -->
          <div class="detail-image-container">
            <img src="${product.image || 'https://via.placeholder.com/400?text=Produit'}" 
                 alt="${product.name}" 
                 class="detail-image" 
                 loading="lazy"
                 onerror="this.src='https://via.placeholder.com/400?text=Image+non+disponible'">
          </div>

          <!-- Info Column -->
          <div class="detail-info">
            <a href="index.html" class="back-btn" style="margin-bottom:15px;display:inline-flex;">
              <i class="fas fa-arrow-left"></i> Retour aux produits
            </a>
            
            <button class="share-btn" onclick="shareProduct('${product.id}', '${encodeURIComponent(product.name)}')">
              <i class="fas fa-share-alt"></i> Partager ce produit
            </button>
            
            <h1>${product.name}</h1>
            <p class="product-category">${product.category || 'Général'}</p>
            <p class="product-description">${product.description || 'Aucune description disponible pour ce produit.'}</p>
            <div class="detail-price">${priceDisplay}</div>
            
            <button class="btn-add-cart" onclick='addToCart("${product.id}", ${productDataSafe})'>
              <i class="fas fa-shopping-cart"></i> Ajouter au Panier
            </button>
            <button class="btn-buy-now" onclick="scrollToOrderForm()">
              <i class="fas fa-bolt"></i> Commander Maintenant
            </button>

            <!-- Quick Order Form -->
            <div class="order-form" id="orderFormSection">
              <h3><i class="fas fa-truck-fast"></i> Livraison Rapide</h3>
              <form id="quickOrderForm" onsubmit="submitQuickOrder(event, '${product.id}')">
                <div class="form-row">
                  <div class="form-group">
                    <label>Prénom *</label>
                    <input type="text" id="qFirstName" required placeholder="Votre prénom" autocomplete="given-name">
                  </div>
                  <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" id="qLastName" required placeholder="Votre nom" autocomplete="family-name">
                  </div>
                </div>
                
                <div class="form-group">
                  <label>Téléphone *</label>
                  <input type="tel" id="qPhone" required placeholder="05XXXXXXXX" pattern="[0-9]{10}" autocomplete="tel">
                </div>
                
                <div class="form-row">
                  <div class="form-group">
                    <label>Wilaya *</label>
                    <select id="qWilaya" required onchange="loadCommunes(this.value); updateShippingPrice();">
                      <option value="">Sélectionner une wilaya</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label>Commune *</label>
                    <select id="qCommune" required>
                      <option value="">Sélectionner une commune</option>
                    </select>
                  </div>
                </div>
                
                <div class="form-group">
                  <label>Type de livraison *</label>
                  <select id="qOrderType" required onchange="updateShippingPrice()">
                    <option value="domicile">🏠 Livraison à domicile</option>
                    <option value="stopdesk">🏢 Stop Desk (Retrait au bureau)</option>
                  </select>
                </div>
                
                <div class="shipping-price">
                  <i class="fas fa-info-circle"></i>
                  <span>Frais de livraison:</span>
                  <strong id="shippingPriceDisplay">0 DA</strong>
                </div>
                
                <button type="submit" class="btn-submit-order" id="submitOrderBtn">
                  <i class="fas fa-check"></i> Confirmer la Commande
                </button>
              </form>
            </div>
          </div>
        </div>
      `;

      loadWilayas();
      updateCartCount();
    }

    // ========== Helper Functions ==========
    function showError(msg) {
      document.getElementById('productContainer').innerHTML = `
        <div class="error">
          <i class="fas fa-exclamation-circle"></i>
          <p style="margin:15px 0;font-size:1.1rem">${msg}</p>
          <a href="index.html"><i class="fas fa-arrow-left"></i> Retour à l'accueil</a>
        </div>
      `;
    }

    function loadWilayas() {
      const select = document.getElementById('qWilaya');
      if (!select) return;
      select.innerHTML = '<option value="">Sélectionner une wilaya</option>';
      wilayasList.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.split(' - ')[0];
        opt.textContent = w;
        select.appendChild(opt);
      });
    }

    function loadCommunes(wilayaCode) {
      const select = document.getElementById('qCommune');
      if (!select) return;
      select.innerHTML = '<option value="">Sélectionner une commune</option>';
      const communes = communesData[wilayaCode] || [];
      communes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c; select.appendChild(opt);
      });
    }

    function updateShippingPrice() {
      const type = document.getElementById('qOrderType')?.value || 'domicile';
      const wilayaCode = document.getElementById('qWilaya')?.value;
      const prices = type === 'stopdesk' ? stopDeskPrices : shippingPrices;
      const wilayaName = wilayasList.find(w => w.startsWith(wilayaCode + ' - '));
      const price = wilayaName ? (prices[wilayaName] || 0) : 0;
      document.getElementById('shippingPriceDisplay').textContent = price + ' DA';
    }

    function scrollToOrderForm() {
      document.getElementById('orderFormSection')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function shareProduct(id, name) {
      const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
      if (navigator.share) {
        navigator.share({ title: decodeURIComponent(name), text: 'Découvrez ce produit sur Amar Informatique', url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          const btn = event.currentTarget;
          const original = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-check"></i> Copié!';
          setTimeout(() => btn.innerHTML = original, 2000);
        });
      }
    }

    // ========== Cart Functions ==========
    function addToCart(productId, productData) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const existing = cart.find(item => item.id === productId);
      
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({
          id: productData.id,
          name: productData.name,
          price: productData.price,
          image: productData.image,
          quantity: 1
        });
      }
      
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert('✅ Produit ajouté au panier!');
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      const els = document.querySelectorAll('#cartCount, .cart-count');
      els.forEach(el => {
        if (el) {
          el.textContent = count;
          el.style.display = count > 0 ? 'flex' : 'none';
        }
      });
    }

    // ========== Submit Quick Order ==========
    async function submitQuickOrder(e, productId) {
      e.preventDefault();
      const btn = document.getElementById('submitOrderBtn');
      const original = btn.innerHTML;
      
      try {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';

        const doc = await db.collection('produits').doc(productId).get();
        if (!doc.exists) throw new Error('Produit introuvable');
        const product = { id: doc.id, ...doc.data() };

        const order = {
          items: [{ 
            id: product.id, 
            name: product.name, 
            price: parseFloat(product.price) || 0, 
            qty: 1, 
            image: product.image 
          }],
          customer: {
            firstName: document.getElementById('qFirstName').value,
            lastName: document.getElementById('qLastName').value,
            phone: document.getElementById('qPhone').value,
            wilaya: document.getElementById('qWilaya').options[document.getElementById('qWilaya').selectedIndex]?.text,
            commune: document.getElementById('qCommune').value,
            orderType: document.getElementById('qOrderType').value
          },
          productDetails: {
            name: product.name,
            price: parseFloat(product.price) || 0,
            category: product.category
          },
          shipping: parseInt(document.getElementById('shippingPriceDisplay').textContent) || 0,
          total: (parseFloat(product.price) || 0) + (parseInt(document.getElementById('shippingPriceDisplay').textContent) || 0),
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          source: 'product-page'
        };

        await db.collection('commandes').add(order);
        
        const orderNum = 'ORD-' + Date.now().toString().slice(-6);
        alert(`✅ Commande envoyée!\nNuméro de suivi: ${orderNum}\n\nNous vous contacterons bientôt.`);
        
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Lead', { value: order.total, currency: 'DZD' });
        }
        
        e.target.reset();
        document.getElementById('shippingPriceDisplay').textContent = '0 DA';
        
      } catch (error) {
        console.error('❌ Erreur commande:', error);
        alert('❌ Erreur lors de l\'envoi. Veuillez réessayer ou nous contacter au 0559 46 99 56');
      } finally {
        btn.disabled = false;
        btn.innerHTML = original;
      }
    }

    // ========== Meta Pixel ==========
    try {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'PageView');
      }
    } catch(e) {
      console.log('⚠️ Meta Pixel non chargé:', e.message);
    }
  </script>
