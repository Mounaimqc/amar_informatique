<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits - Amar Informatique</title>
    <link rel="icon" href="logo.jpg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUjSJTplPn9O8pK_YU5ydsyqUQ9HVfKXo",
            authDomain: "amar-informatique.firebaseapp.com",
            projectId: "amar-informatique",
            storageBucket: "amar-informatique.firebasestorage.app",
            messagingSenderId: "568367870390",
            appId: "1:568367870390:web:e1583c182272ecbf141117"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* ===== Header ===== */
        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-items {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* ===== Buttons ===== */
        .btn {
            padding: 0.65rem 1.25rem;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #3d5068;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* ===== Main Container ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ===== Page Header ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        /* ===== Category Cards ===== */
        .cat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .cat-card {
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            border: 1px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .cat-card:hover::before,
        .cat-card.active::before {
            opacity: 1;
        }

        .cat-card:hover {
            transform: translateY(-3px);
        }

        .cat-card.active {
            transform: translateY(-3px);
        }

        .cat-card.all {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(99, 102, 241, 0.06));
            border-color: rgba(99, 102, 241, 0.35);
        }

        .cat-card.laptop {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.12), rgba(6, 182, 212, 0.06));
            border-color: rgba(6, 182, 212, 0.35);
        }

        .cat-card.imprimantes {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.06));
            border-color: rgba(245, 158, 11, 0.35);
        }

        .cat-card.accessoires {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.06));
            border-color: rgba(16, 185, 129, 0.35);
        }

        .cat-card.active.all {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }

        .cat-card.active.laptop {
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.3);
        }

        .cat-card.active.imprimantes {
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3);
        }

        .cat-card.active.accessoires {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
        }

        .cat-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .cat-card.all .cat-icon {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .cat-card.laptop .cat-icon {
            background: rgba(6, 182, 212, 0.2);
            color: #22d3ee;
        }

        .cat-card.imprimantes .cat-icon {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .cat-card.accessoires .cat-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .cat-info {
            flex: 1;
            min-width: 0;
        }

        .cat-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cat-count {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.1;
        }

        /* ===== Search Bar ===== */
        .search-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .search-bar input {
            flex: 1;
            padding: 0.65rem 1rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ===== Products Grid ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.25rem;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(99, 102, 241, 0.3);
        }

        .product-img-wrap {
            width: 100%;
            height: 190px;
            background: var(--bg-main);
            overflow: hidden;
            position: relative;
        }

        .product-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-img-wrap img {
            transform: scale(1.05);
        }

        .no-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--text-muted);
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .product-body {
            padding: 1rem 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .product-category {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            width: fit-content;
        }

        .cat-badge-laptop {
            background: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .cat-badge-imprimantes {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .cat-badge-accessoires {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .cat-badge-default {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .product-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--success);
            margin-top: auto;
            padding-top: 0.5rem;
        }

        .product-actions {
            padding: 0.75rem 1.25rem 1.25rem;
            display: flex;
            gap: 0.6rem;
        }

        .product-actions button {
            flex: 1;
        }

        /* ===== Empty / Loading State ===== */
        .state-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .state-box .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== Modal ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            max-width: 640px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 1.25rem 1.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            border: none;
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-body {
            padding: 1.75rem;
        }

        .modal-footer {
            padding: 1.25rem 1.75rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* ===== Form ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            min-height: 90px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .img-preview {
            margin-top: 0.6rem;
            border-radius: var(--radius);
            overflow: hidden;
            max-height: 180px;
        }

        .img-preview img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
        }

        /* ===== Notification ===== */
        .notif {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 0.9rem 1.4rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            z-index: 9999;
            color: white;
            animation: slideIn 0.3s ease;
        }

        .notif.success {
            background: var(--success);
        }

        .notif.error {
            background: var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        /* stats-bar kept for compatibility but hidden — replaced by cat-cards */

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }

            .navbar {
                padding: 0.9rem 1rem;
                flex-wrap: wrap;
            }

            .products-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.9rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
        }

        @media (max-width: 400px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <h1><i class="fas fa-boxes"></i> Gestion des Produits</h1>
            </div>
            <div class="nav-items">
                <a href="admin.html" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Dashboard</a>
                <button class="btn btn-success btn-sm" onclick="openAddModal()"><i class="fas fa-plus"></i>
                    Ajouter</button>
            </div>
        </nav>
    </header>

    <main class="container">

        <!-- Category cards (act as filters) -->
        <div class="cat-cards">
            <div class="cat-card all active" onclick="filterByCat('')" id="card-all">
                <div class="cat-icon"><i class="fas fa-th-large"></i></div>
                <div class="cat-info">
                    <div class="cat-name">Tous</div>
                    <div class="cat-count" id="statTotal">—</div>
                </div>
            </div>
            <div class="cat-card laptop" onclick="filterByCat('laptop')" id="card-laptop">
                <div class="cat-icon"><i class="fas fa-laptop"></i></div>
                <div class="cat-info">
                    <div class="cat-name">Laptops</div>
                    <div class="cat-count" id="statLaptop">—</div>
                </div>
            </div>
            <div class="cat-card imprimantes" onclick="filterByCat('imprimantes')" id="card-imprimantes">
                <div class="cat-icon"><i class="fas fa-print"></i></div>
                <div class="cat-info">
                    <div class="cat-name">Imprimantes</div>
                    <div class="cat-count" id="statImp">—</div>
                </div>
            </div>
            <div class="cat-card accessoires" onclick="filterByCat('accessoires')" id="card-accessoires">
                <div class="cat-icon"><i class="fas fa-plug"></i></div>
                <div class="cat-info">
                    <div class="cat-name">Accessoires</div>
                    <div class="cat-count" id="statAcc">—</div>
                </div>
            </div>
        </div>

        <!-- Search bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍  Rechercher un produit...">
            <button class="btn btn-secondary btn-sm" onclick="resetFilters()"><i class="fas fa-times"></i>
                Reset</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <div class="state-box">
                <div class="spinner"></div>
                <p>Chargement des produits...</p>
            </div>
        </div>

    </main>

    <!-- ===== Add Product Modal ===== -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> Ajouter un Produit</h2>
                <button class="modal-close" onclick="closeAddModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <div class="form-group">
                        <label class="form-label">Nom du produit *</label>
                        <input type="text" id="addName" class="form-input" placeholder="Ex: Laptop Dell Inspiron 15"
                            required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Catégorie *</label>
                            <select id="addCategory" class="form-select" required>
                                <option value="">Sélectionner...</option>
                                <option value="laptop">Laptop</option>
                                <option value="imprimantes">Imprimantes</option>
                                <option value="accessoires">Accessoires</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Prix (DA) *</label>
                            <input type="number" id="addPrice" class="form-input" placeholder="Ex: 85000" min="0"
                                step="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="addDesc" class="form-textarea"
                            placeholder="Description courte du produit..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Chemin image GitHub *</label>
                        <input type="text" id="addImage" class="form-input" placeholder="Ex: images/2410.jpeg" required>
                        <div class="img-preview" id="addImgPreview"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">Annuler</button>
                <button class="btn btn-success" onclick="submitAdd()"><i class="fas fa-save"></i> Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- ===== Edit Product Modal ===== -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Modifier le Produit</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <div class="form-group">
                        <label class="form-label">Nom du produit *</label>
                        <input type="text" id="editName" class="form-input" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Catégorie *</label>
                            <select id="editCategory" class="form-select" required>
                                <option value="laptop">Laptop</option>
                                <option value="imprimantes">Imprimantes</option>
                                <option value="accessoires">Accessoires</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Prix (DA) *</label>
                            <input type="number" id="editPrice" class="form-input" min="0" step="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="editDesc" class="form-textarea"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Chemin image GitHub</label>
                        <input type="text" id="editImage" class="form-input" placeholder="Ex: images/2410.jpeg">
                        <div class="img-preview" id="editImgPreview"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button>
                <button class="btn btn-primary" onclick="submitEdit()"><i class="fas fa-save"></i> Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('adminLogged') !== 'true') window.location.href = 'login.html';

        let allProducts = [];
        let editingId = null;

        // ===== Load products from Firestore =====
        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Chargement...</p></div>';
            try {
                const snap = await db.collection('produits').get();
                allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // Sort client-side: newest first (fallback to name if no dateAdded)
                allProducts.sort((a, b) => {
                    if (a.dateAdded && b.dateAdded) return b.dateAdded.localeCompare(a.dateAdded);
                    if (a.dateAdded) return -1;
                    if (b.dateAdded) return 1;
                    return (a.name || '').localeCompare(b.name || '');
                });
                updateStats();
                renderGrid(allProducts);
            } catch (e) {
                grid.innerHTML = `<div class="state-box"><p style="color:var(--danger)">❌ Erreur : ${e.message}</p></div>`;
            }
        }

        // ===== Render grid =====
        function renderGrid(products) {
            const grid = document.getElementById('productsGrid');
            if (!products.length) {
                grid.innerHTML = '<div class="state-box"><p style="font-size:2rem">📭</p><p>Aucun produit trouvé.</p></div>';
                return;
            }
            grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-img-wrap">
            ${p.image
                    ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-img-placeholder\\'><i class=\\'fas fa-image\\'></i></div>'">`
                    : `<div class="no-img-placeholder"><i class="fas fa-image"></i></div>`}
          </div>
          <div class="product-body">
            <span class="product-category ${catBadgeClass(p.category)}">${catIcon(p.category)} ${catLabel(p.category)}</span>
            <div class="product-name">${escHtml(p.name || '—')}</div>
            ${p.description ? `<div class="product-desc">${escHtml(p.description)}</div>` : ''}
            <div class="product-price">${(p.price || 0).toLocaleString('fr-DZ')} DA</div>
          </div>
          <div class="product-actions">
            <button class="btn btn-primary btn-sm" onclick="openEdit('${p.id}')"><i class="fas fa-edit"></i> Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete('${p.id}','${escAttr(p.name)}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
        }

        // ===== Stats =====
        function updateStats() {
            document.getElementById('statTotal').textContent = allProducts.length;
            document.getElementById('statLaptop').textContent = allProducts.filter(p => p.category === 'laptop').length;
            document.getElementById('statImp').textContent = allProducts.filter(p => p.category === 'imprimantes').length;
            document.getElementById('statAcc').textContent = allProducts.filter(p => p.category === 'accessoires').length;
        }

        // ===== Filter =====
        let activeCat = '';

        function filterByCat(cat) {
            activeCat = cat;
            // Update active card
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            const cardId = cat ? `card-${cat}` : 'card-all';
            document.getElementById(cardId)?.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p =>
                (!q || (p.name || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)) &&
                (!activeCat || p.category === activeCat)
            );
            renderGrid(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            activeCat = '';
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-all')?.classList.add('active');
            renderGrid(allProducts);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // ===== Delete =====
        async function confirmDelete(id, name) {
            if (!confirm(`⚠️ Supprimer "${name}" ? Cette action est irréversible.`)) return;
            try {
                await db.collection('produits').doc(id).delete();
                allProducts = allProducts.filter(p => p.id !== id);
                updateStats();
                applyFilters();
                showNotif('🗑️ Produit supprimé !');
            } catch (e) {
                alert('❌ Erreur : ' + e.message);
            }
        }

        // ===== Add Modal =====
        function openAddModal() {
            document.getElementById('addForm').reset();
            document.getElementById('addImgPreview').innerHTML = '';
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        async function submitAdd() {
            const name = document.getElementById('addName').value.trim();
            const cat = document.getElementById('addCategory').value;
            const price = parseFloat(document.getElementById('addPrice').value);
            const desc = document.getElementById('addDesc').value.trim();
            const img = document.getElementById('addImage').value.trim();
            if (!name || !cat || isNaN(price) || price <= 0 || !img) {
                alert('⚠️ Remplissez tous les champs obligatoires (*)');
                return;
            }
            try {
                const ref = await db.collection('produits').add({
                    name, category: cat, price, description: desc, image: img,
                    dateAdded: new Date().toISOString()
                });
                allProducts.unshift({ id: ref.id, name, category: cat, price, description: desc, image: img, dateAdded: new Date().toISOString() });
                updateStats();
                applyFilters();
                closeAddModal();
                showNotif('✅ Produit ajouté !');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        // ===== Edit Modal =====
        function openEdit(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('editName').value = p.name || '';
            document.getElementById('editCategory').value = p.category || 'laptop';
            document.getElementById('editPrice').value = p.price || '';
            document.getElementById('editDesc').value = p.description || '';
            document.getElementById('editImage').value = p.image || '';
            const pv = document.getElementById('editImgPreview');
            pv.innerHTML = p.image ? `<img src="${p.image}" onerror="this.style.display='none'">` : '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        async function submitEdit() {
            if (!editingId) return;
            const name = document.getElementById('editName').value.trim();
            const cat = document.getElementById('editCategory').value;
            const price = parseFloat(document.getElementById('editPrice').value);
            const desc = document.getElementById('editDesc').value.trim();
            const img = document.getElementById('editImage').value.trim();
            if (!name || !cat || isNaN(price) || price <= 0) {
                alert('⚠️ Remplissez tous les champs obligatoires (*)');
                return;
            }
            const data = { name, category: cat, price, description: desc, image: img };
            try {
                await db.collection('produits').doc(editingId).update(data);
                const idx = allProducts.findIndex(x => x.id === editingId);
                if (idx !== -1) allProducts[idx] = { ...allProducts[idx], ...data };
                updateStats();
                applyFilters();
                closeEditModal();
                showNotif('✅ Produit modifié !');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        // ===== Image live preview =====
        document.getElementById('addImage').addEventListener('input', function () {
            const pv = document.getElementById('addImgPreview');
            pv.innerHTML = this.value ? `<img src="${this.value}" onerror="this.style.display='none'">` : '';
        });

        document.getElementById('editImage').addEventListener('input', function () {
            const pv = document.getElementById('editImgPreview');
            pv.innerHTML = this.value ? `<img src="${this.value}" onerror="this.style.display='none'">` : '';
        });

        // ===== Helpers =====
        const CAT_META = {
            laptop: { label: 'Laptop', icon: '<i class="fas fa-laptop"></i>', badge: 'cat-badge-laptop' },
            imprimantes: { label: 'Imprimantes', icon: '<i class="fas fa-print"></i>', badge: 'cat-badge-imprimantes' },
            accessoires: { label: 'Accessoires', icon: '<i class="fas fa-plug"></i>', badge: 'cat-badge-accessoires' },
        };

        function catLabel(c) { return (CAT_META[c] || {}).label || c || '—'; }
        function catIcon(c) { return (CAT_META[c] || { icon: '<i class="fas fa-tag"></i>' }).icon; }
        function catBadgeClass(c) { return (CAT_META[c] || {}).badge || 'cat-badge-default'; }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escAttr(s) {
            return String(s || '').replace(/'/g, "\\'");
        }

        function showNotif(msg, type = 'success') {
            const n = document.createElement('div');
            n.className = `notif ${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => { n.style.animation = 'slideOut 0.3s ease'; setTimeout(() => n.remove(), 300); }, 3000);
        }

        // Close modals on backdrop click
        document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
        document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

        // ===== Init =====
        loadProducts();
    </script>

</body>

</html>
