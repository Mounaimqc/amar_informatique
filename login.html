<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0F19">
  
  <title>Connexion Admin - Amar Informatique</title>
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.jpg" type="image/x-icon">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dark-mode" style="background-color:#0B0F19; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">

  <!-- Login Card Wrapper -->
  <div class="admin-login-card" style="animation: slideUp 400ms ease;">
    <div class="admin-login-head">
      <div style="width:60px; height:60px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
        <i data-lucide="shield-alert" style="width:30px; height:30px;"></i>
      </div>
      <h1>Portail Sécurisé</h1>
      <p>Panneau d'administration de la boutique</p>
    </div>

    <!-- Error message dialog -->
    <div id="errorMessage" style="display:none; padding:12px; background-color:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:var(--radius-sm); color:var(--danger); font-size:0.85rem; font-weight:600; margin-bottom:20px;">
      ❌ Mot de passe incorrect
    </div>

    <!-- Info hint box -->
    <div style="background-color:var(--primary-light); border-left:4px solid var(--primary); padding:12px; border-radius:4px; font-size:0.8rem; color:var(--primary); margin-bottom:25px; text-align:left; line-height:1.4;">
      <strong>Accès Administrateur</strong>
      Seul le personnel d'Amar Informatique est habilité à franchir cette étape.
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group" style="text-align:left; margin-bottom:25px;">
        <label for="password" class="form-label" style="margin-bottom:8px; display:block;">Clé d'accès *</label>
        <div style="position:relative; display:flex; align-items:center;">
          <input type="password" id="password" placeholder="Saisir le mot de passe admin" class="search-input" style="width:100%; border-radius:8px; padding:12px 14px 12px 40px; font-size:1rem;" autofocus required>
          <i data-lucide="key-round" style="position:absolute; left:14px; width:18px; height:18px; color:var(--text-muted);"></i>
        </div>
      </div>
      
      <button type="submit" class="btn-checkout" style="margin-top:0; border-radius:8px; font-weight:700;">
        Se connecter au Dashboard
      </button>
    </form>
    
    <a href="index.html" style="display:inline-flex; align-items:center; gap:6px; margin-top:20px; font-size:0.85rem; color:var(--text-muted); font-weight:600;">
      <i data-lucide="arrow-left" style="width:16px;"></i> Retourner au magasin
    </a>
  </div>

  <script>
    // Mot de passe admin original
    const ADMIN_PASSWORD = 'amar19';

    document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) lucide.createIcons();
    });

    function handleLogin(event) {
        event.preventDefault();
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('errorMessage');

        if (password === ADMIN_PASSWORD) {
            // Activer la session de l'admin
            sessionStorage.setItem('adminLogged', 'true');
            // Rediriger vers le dashboard
            window.location.href = 'admin.html';
        } else {
            errorMessage.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }

    // Redirection automatique si déjà connecté
    if (sessionStorage.getItem('adminLogged') === 'true') {
        window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
